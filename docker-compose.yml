version: '3.8'

services:
  neo4j:
    image: neo4j:5.15.0-community
    container_name: logic-neo4j
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    restart: always
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  streamlit-app:
    build: .
    container_name: logic-streamlit-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687  # Connects directly to the neo4j container within the docker network
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - NEO4J_DATABASE=neo4j         # Community Edition defaults to 'neo4j' database
    depends_on:
      neo4j:
        condition: service_healthy
    restart: always

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
